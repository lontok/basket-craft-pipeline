version: 2

models:
  - name: monthly_sales_summary
    description: Monthly revenue and order counts, one row per (month, product).
    columns:
      - name: month
        description: First day of the calendar month.
        data_tests:
          - not_null
      - name: product_name
        description: Product name from raw.products.
        data_tests:
          - not_null
      - name: total_revenue
        description: Sum of order_items.price_usd for the month and product.
        data_tests:
          - not_null
      - name: order_count
        description: Distinct orders containing this product in the month.
        data_tests:
          - not_null
      - name: avg_order_value
        description: total_revenue / order_count, rounded to two decimals.
      - name: total_items_sold
        description: Raw count of order_items rows.
      - name: loaded_at
        description: Timestamp this row was built by dbt.

  - name: dim_date
    description: Conformed calendar dimension. Generated from a 30-year spine starting 2010-01-01.
    columns:
      - name: date_key
        description: Primary key. Type DATE.
        data_tests:
          - unique
          - not_null
      - name: full_date
        description: Duplicate of date_key for query readability.
        data_tests:
          - not_null
      - name: year
        data_tests:
          - not_null
      - name: quarter
        data_tests:
          - not_null
      - name: month
        data_tests:
          - not_null
      - name: is_weekend
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

  - name: dim_product
    description: Product dimension. SCD Type 1 — current attributes only, no history.
    columns:
      - name: product_id
        description: Primary key.
        data_tests:
          - unique
          - not_null
      - name: product_name
        data_tests:
          - not_null
      - name: product_description
      - name: product_created_at
        description: Renamed from stg_products.created_at to avoid clashing with the fact's created_at.

  - name: fct_order_items
    description: >
      Fact at order line-item grain. One row per order_item_id. Joins
      int_order_items_with_refunds to stg_orders for primary_product_id and user_id.
    columns:
      - name: order_item_id
        description: Primary key (degenerate dimension).
        data_tests:
          - unique
          - not_null
      - name: order_id
        description: Degenerate dimension. Group by this to see basket contents.
        data_tests:
          - not_null
      - name: user_id
        description: Degenerate dimension. Use COUNT DISTINCT for customer counts.
      - name: date_key
        description: FK to dim_date.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: product_id
        description: FK to dim_product (line item's product).
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_product')
                field: product_id
      - name: primary_product_id
        description: FK to dim_product (order's headline product, role-playing dim).
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_product')
                field: product_id
      - name: price_usd
        data_tests:
          - not_null
      - name: cogs_usd
        data_tests:
          - not_null
      - name: refund_amount_usd
        data_tests:
          - not_null
      - name: is_primary_item
        data_tests:
          - not_null
      - name: gross_profit_usd
        description: price_usd - cogs_usd.
      - name: net_revenue_usd
        description: price_usd - refund_amount_usd.
      - name: net_profit_usd
        description: price_usd - cogs_usd - refund_amount_usd.
      - name: has_refund
        description: True when refund_amount_usd > 0.
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
